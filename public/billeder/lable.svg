  <g id="Ingredienser">
    <text class="st6" transform="translate(223.24 135.74)"><tspan class="st5"><tspan x="0" y="0">Unpasteurised / Unfiltered</tspan></tspan><tspan class="st5" x="0" y="12">Ingredients: water, </tspan><tspan class="st8" x="51.03" y="12">BARLEY</tspan><tspan class="st5" x="75.69" y="12">, </tspan><tspan class="st8" x="79.03" y="12">WHEAT</tspan><tspan class="st5" x="101.02" y="12">, hops (Mosaic,</tspan><tspan class="st5"><tspan x="0" y="18">Idaho 7, Columbus, Chinook), yeast</tspan></tspan><tspan class="st8"><tspan x="0" y="30">BYG, KORN, BYGG, OHRA, CEBADA, ORGE, ORZO,</tspan></tspan><tspan class="st8"><tspan x="0" y="36">GERST, GERSTE / HVEDE, (H)VETE, VEHNÄ, TRIGO,</tspan></tspan><tspan class="st8"><tspan x="0" y="42">DU BLÉ, GRANO, TARWE, WEIZEN</tspan></tspan></text>
  </g>
  <g id="Beskrivelse">
    <text class="st2" transform="translate(223.24 96.35)"><tspan x="0" y="0">Cloud Gazing is a modern West Coast IPA</tspan><tspan x="0" y="8">boasting a blend of hops that express</tspan><tspan x="0" y="16">citrus fruits, evergreen forest, and an</tspan><tspan x="0" y="24">approachable bitterness</tspan></text>
    <text class="st1" transform="translate(223.24 73.16)"><tspan x="0" y="0">West Coast IPA</tspan><tspan x="0" y="10">44 cl / Alc. 6.2% vol.</tspan></text>
    <text class="st0" transform="translate(223.24 58.02)"><tspan x="0" y="0">Cloud Gazing</tspan></text>
  </g>
  <g id="Holdbarhed">
    <text class="st4" transform="translate(299.14 350.4)"><tspan x="0" y="0">Best before: See bottom / Keep cold and enjoy fresh</tspan></text>
